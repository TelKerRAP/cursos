<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos Online Pro</title>
<meta name="description" content="Aprende con nuestros cursos online de Marketing, Diseño, Programación y más. Compra por WhatsApp fácilmente.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary-color: #38bdf8;
  --bg-color: #0f172a;
  --card-bg: #1e293b;
  --btn-color: #25d366;
  --btn-hover: #1ebe55;
  --text-color: #fff;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg-color);
  color: var(--text-color);
  padding-bottom: 100px; /* espacio para footer */
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 20px;
}
header h1 {
  font-size: 2.5rem;
  color: var(--primary-color);
}

/* SECTION */
section.courses {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}
section.courses h2 {
  text-align: center;
  margin-bottom: 30px;
  color: var(--primary-color);
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: var(--card-bg);
  border-radius: 15px;
  padding: 20px;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}
.card h3 {
  color: var(--primary-color);
}
.card p {
  margin: 10px 0;
}

/* BOTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: var(--btn-color);
  color: var(--text-color);
  text-decoration: none;
  border-radius: 8px;
  transition: background 0.3s;
}
.btn:hover, .btn:focus {
  background: var(--btn-hover);
  outline: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  width: 100%;
  background: rgba(0,0,0,0.7);
  color: white;
  backdrop-filter: blur(5px);
  position: relative; /* para que no tape contenido */
  bottom: 0;
}
</style>
</head>

<body>

<header>
  <h1>🎓 Cursos Online</h1>
</header>

<main>
  <section class="courses">
    <h2>Nuestros Cursos</h2>
    <div class="container" id="courses-container">
      <!-- Los cursos se generarán aquí -->
    </div>
  </section>
</main>

<footer>
  © Aprendizaje Auto-Didacta ®
</footer>

<script>
const cursos = [
  { nombre: 'Marketing Digital', descripcion: 'Aprende a vender en internet desde cero.' },
  { nombre: 'Diseño Gráfico', descripcion: 'Crea diseños profesionales para redes sociales.' },
  { nombre: 'Programación Web', descripcion: 'Aprende HTML, CSS y JavaScript.' },
  { nombre: 'Ventas', descripcion: 'Domina técnicas de cierre de ventas.' },
  { nombre: 'Inteligencia Artificial', descripcion: 'Aprende a usar IA para negocios.' },
  { nombre: 'Fotografía', descripcion: 'Domina la fotografía profesional.' },
  { nombre: 'Edición de Video', descripcion: 'Aprende a crear videos impresionantes.' },
  { nombre: 'Redes Sociales', descripcion: 'Gestiona y crece tu comunidad online.' },
  { nombre: 'SEO y Marketing', descripcion: 'Posiciona tus páginas web en Google.' },
  { nombre: 'Productividad', descripcion: 'Optimiza tu tiempo y proyectos.' }
];

const container = document.getElementById('courses-container');

cursos.forEach(curso => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h3>${curso.nombre}</h3>
    <p>${curso.descripcion}</p>
    <a class="btn" href="https://wa.me/5213222373809?text=Hola quiero info del Curso ${encodeURIComponent(curso.nombre)}" target="_blank" rel="noopener noreferrer">
      📲 Comprar por WhatsApp
    </a>
  `;
  container.appendChild(card);
});
</script>

</body>
</html>
